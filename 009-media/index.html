<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HTML 009-多媒體標籤</title>
</head>
<body>
  
    <div>
        <h3>1. 展示圖片</h3>
        <img src="https://picsum.photos/400/250" alt="隨機生成的風景圖" width="400">
    </div>

    <br><hr><br>

    <div>
        <h3>2. 播放音樂</h3>
        <audio src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" controls>
            您的瀏覽器不支援 audio 標籤。
        </audio>
    </div>

    <br><hr><br>

    <div>
        <h3>3. 播放影片</h3>
        <video src="https://www.w3schools.com/html/mov_bbb.mp4" controls width="400">
            您的瀏覽器不支援 video 標籤。
        </video>
    </div>

</body>
</html>
