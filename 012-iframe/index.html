<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 012-內嵌框架 iframe</title>
</head>
<body>

    <h1>網頁</h1>
    <p>把外部的服務（如地圖、影片）嵌入到自己的網頁！</p>

    <hr>

    <div>
        <h3>1. 嵌入互動式 Google 地圖</h3>
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3637.214647319696!2d120.6220141!3d24.3477121!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x34690e386ebf4561%3A0x6bda19a91901a1e!2z5aSn55Sy6Y6u57g澜5a6u!5e0!3m2!1szh-TW!2stw!4v1710000000000!5m2!1szh-TW!2stw" 
            width="600" 
            height="400" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </div>

    <br><hr><br>

    <div>
        <h3>2. 嵌入 YouTube 影片播放器</h3>
        <iframe 
            width="600" 
            height="400" 
            src="https://www.youtube.com/embed/gNSL29rPyYA?si=mNfGlLe_Vs8Ag2sF" 
            title="YouTube video player" 
            style="border:0;" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
