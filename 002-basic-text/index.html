<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HTML 002 - 常用文字標籤</title>
</head>
<body>

    <h1>大標題 (h1)：個人主頁</h1>
    <p>這是段落 (p)，可以用來寫自我介紹。</p>

    <h2>次標題 (h2)：我的技能</h2>
    <p>前端開發的核心是 <strong>重要文字 (strong)</strong> 與 <em>強調文字 (em)</em>。</p>

    <hr> <blockquote>
        這是引用區塊 (blockquote)，會自動向右縮排。
    </blockquote>

</body>
</html>
